apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniroute-01
  namespace: omniroute-01-prod
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/part-of: omniroute
    app.kubernetes.io/instance: omniroute-01
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omniroute
      app.kubernetes.io/instance: omniroute-01
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omniroute
        app.kubernetes.io/instance: omniroute-01
        app.kubernetes.io/component: app
    spec:
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: omniroute
              app.kubernetes.io/component: app
      containers:
        - name: omniroute
          image: ghcr.io/101aix/omniroute:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 20128
              protocol: TCP
          envFrom:
            - configMapRef:
                name: omniroute-01-env
            - secretRef:
                name: omniroute-01-secret
          readinessProbe:
            httpGet:
              path: /api/monitoring/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/monitoring/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/monitoring/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /app/data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omniroute-01-data
