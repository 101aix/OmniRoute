apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omniroute-01
  namespace: omniroute-01-prod
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/part-of: omniroute
    app.kubernetes.io/instance: omniroute-01
spec:
  ingressClassName: higress
  rules:
    - host: omniroute.101aix.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omniroute-01
                port:
                  number: 20128
